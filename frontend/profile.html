<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/x-icon" href="assets/images/favicon.ico">
  <link rel="apple-touch-icon" href="assets/images/apple-touch-icon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Profile – foodPac</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: { 50:'#f1f8e9',100:'#dcedc8',200:'#c5e1a5',500:'#4caf50',600:'#43a047',700:'#388e3c',800:'#2e7d32',900:'#1b5e20' },
            accent:  { 400:'#ffa726',500:'#f57c00',600:'#e65100' }
          },
          fontFamily: { sans: ['Inter','ui-sans-serif','system-ui'] }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="font-sans bg-gray-50 min-h-screen">

  <div id="navbar"></div>

  <main class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 py-12">

    <!-- Page header -->
    <div class="mb-8">
      <h1 class="text-2xl font-bold text-gray-900">My Profile</h1>
      <p class="text-gray-500 mt-1 text-sm">Manage your account information</p>
    </div>

    <!-- Auth guard — shown while loading -->
    <div id="authLoading" class="flex items-center justify-center py-24">
      <div class="flex flex-col items-center gap-4 text-gray-400">
        <svg class="w-10 h-10 animate-spin" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"/>
        </svg>
        <span class="text-sm">Loading…</span>
      </div>
    </div>

    <!-- Not logged in state -->
    <div id="authRequired" class="hidden">
      <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-10 text-center">
        <div class="w-16 h-16 bg-primary-50 rounded-full flex items-center justify-center mx-auto mb-4">
          <svg class="w-8 h-8 text-primary-700" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
              d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
            <circle cx="12" cy="7" r="4" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"/>
          </svg>
        </div>
        <h2 class="text-lg font-semibold text-gray-900 mb-2">Sign in to view your profile</h2>
        <p class="text-gray-500 text-sm mb-6">You need to be logged in to access this page.</p>
        <button id="signInBtn"
          class="inline-flex items-center gap-2.5 px-6 py-3 bg-primary-800 hover:bg-primary-900 text-white font-semibold rounded-xl transition-colors shadow-md">
          <svg class="w-5 h-5" viewBox="0 0 24 24">
            <path fill="#fff" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="#fff" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#fff" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
            <path fill="#fff" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
          </svg>
          Continue with Google
        </button>
      </div>
    </div>

    <!-- Profile form — shown when logged in -->
    <div id="profileContent" class="hidden space-y-6">

      <!-- Avatar + name card -->
      <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 flex items-center gap-5">
        <div id="avatarWrap" class="shrink-0"></div>
        <div>
          <h2 id="displayName" class="text-lg font-bold text-gray-900">—</h2>
          <p id="displayEmail" class="text-sm text-gray-400 mt-0.5">—</p>
          <span class="inline-flex items-center gap-1.5 mt-2 px-2.5 py-1 bg-primary-50 text-primary-700 text-xs font-medium rounded-full">
            <svg class="w-3 h-3" viewBox="0 0 24 24" fill="currentColor">
              <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
              <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
              <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
              <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            Google Account
          </span>
        </div>
      </div>

      <!-- Editable details -->
      <div class="bg-white rounded-2xl shadow-sm border border-gray-100">
        <div class="px-6 py-5 border-b border-gray-100">
          <h3 class="font-semibold text-gray-900">Account Details</h3>
          <p class="text-xs text-gray-400 mt-0.5">Update your contact and business information</p>
        </div>
        <form id="profileForm" class="px-6 py-5 space-y-5">

          <div class="grid sm:grid-cols-2 gap-5">
            <!-- Name -->
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1.5" for="fieldName">
                Full Name
              </label>
              <input id="fieldName" name="name" type="text" autocomplete="name"
                class="w-full px-4 py-2.5 rounded-xl border border-gray-200 text-sm text-gray-900
                       focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent
                       placeholder-gray-400 transition-shadow"
                placeholder="Jane Doe">
            </div>

            <!-- Phone -->
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1.5" for="fieldPhone">
                Phone Number
              </label>
              <input id="fieldPhone" name="phone" type="tel" autocomplete="tel"
                class="w-full px-4 py-2.5 rounded-xl border border-gray-200 text-sm text-gray-900
                       focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent
                       placeholder-gray-400 transition-shadow"
                placeholder="+1 (416) 555-0100">
            </div>
          </div>

          <!-- Company -->
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1.5" for="fieldCompany">
              Restaurant / Company Name
            </label>
            <input id="fieldCompany" name="company" type="text" autocomplete="organization"
              class="w-full px-4 py-2.5 rounded-xl border border-gray-200 text-sm text-gray-900
                     focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent
                     placeholder-gray-400 transition-shadow"
              placeholder="e.g. Maple Street Kitchen">
          </div>

          <!-- Address -->
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1.5" for="fieldAddress">
              Delivery Address
            </label>
            <input id="fieldAddress" name="address" type="text" autocomplete="street-address"
              class="w-full px-4 py-2.5 rounded-xl border border-gray-200 text-sm text-gray-900
                     focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent
                     placeholder-gray-400 transition-shadow"
              placeholder="123 King St W, Toronto, ON M5H 1J9">
          </div>

          <!-- Save + feedback -->
          <div class="flex items-center gap-4 pt-1">
            <button type="submit" id="saveBtn"
              class="inline-flex items-center gap-2 px-6 py-2.5 bg-primary-800 hover:bg-primary-900 text-white text-sm font-semibold rounded-xl transition-all shadow-md shadow-primary-900/20 hover:-translate-y-px disabled:opacity-60 disabled:cursor-not-allowed disabled:translate-y-0">
              <svg id="saveSpinner" class="hidden w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"/>
              </svg>
              Save Changes
            </button>
            <p id="saveStatus" class="text-sm hidden"></p>
          </div>
        </form>
      </div>

      <!-- Danger zone -->
      <div class="bg-white rounded-2xl shadow-sm border border-gray-100 px-6 py-5">
        <h3 class="font-semibold text-gray-900 mb-1">Sign Out</h3>
        <p class="text-sm text-gray-400 mb-4">You'll need to sign in again to access your account.</p>
        <button id="profileSignOutBtn"
          class="inline-flex items-center gap-2 px-5 py-2.5 border border-red-200 text-red-600 hover:bg-red-50 text-sm font-medium rounded-xl transition-colors">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
          </svg>
          Sign out
        </button>
      </div>

    </div><!-- /profileContent -->
  </main>

  <div id="footer"></div>

  <script type="module">
    import { initNav, initFooter }        from './js/components.js';
    import { getCurrentUser, loginWithGoogle, logout } from './js/auth.js';
    import { API_BASE }                   from './js/api.js';
    import { avatarHtml }                 from './js/avatar.js';
    import { initDesignWidget }           from './js/design-widget.js';

    initNav();
    initFooter();
    initDesignWidget();

    /* ── Auth gate ──────────────────────────────────────────── */
    getCurrentUser().then(user => {
    document.getElementById('authLoading').classList.add('hidden');

    if (!user) {
      document.getElementById('authRequired').classList.remove('hidden');
      document.getElementById('signInBtn').addEventListener('click', loginWithGoogle);
      return;
    }

    /* ── Populate UI ────────────────────────────────────────── */
    document.getElementById('profileContent').classList.remove('hidden');

    // Avatar
    const avatarWrap = document.getElementById('avatarWrap');
    avatarWrap.innerHTML = avatarHtml(user, 64);

    document.getElementById('displayName').textContent  = user.name  || '—';
    document.getElementById('displayEmail').textContent = user.email || '—';

    // Pre-fill form
    document.getElementById('fieldName').value    = user.name    || '';
    document.getElementById('fieldPhone').value   = user.phone   || '';
    document.getElementById('fieldCompany').value = user.company || '';
    document.getElementById('fieldAddress').value = user.address || '';

    /* ── Save handler ───────────────────────────────────────── */
    document.getElementById('profileForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const saveBtn     = document.getElementById('saveBtn');
      const saveSpinner = document.getElementById('saveSpinner');
      const saveStatus  = document.getElementById('saveStatus');

      saveBtn.disabled = true;
      saveSpinner.classList.remove('hidden');
      saveStatus.classList.add('hidden');

      const payload = {
        name:    document.getElementById('fieldName').value.trim(),
        phone:   document.getElementById('fieldPhone').value.trim(),
        company: document.getElementById('fieldCompany').value.trim(),
        address: document.getElementById('fieldAddress').value.trim(),
      };

      try {
        const res = await fetch(`${API_BASE}/users/profile`, {
          method:      'PUT',
          credentials: 'include',
          headers:     { 'Content-Type': 'application/json' },
          body:        JSON.stringify(payload),
        });

        if (res.ok) {
          const updated = await res.json();
          document.getElementById('displayName').textContent = updated.name || payload.name || '—';
          saveStatus.textContent   = '✓ Changes saved';
          saveStatus.className     = 'text-sm text-primary-700';
          saveStatus.classList.remove('hidden');
        } else {
          throw new Error(`HTTP ${res.status}`);
        }
      } catch (err) {
        // Backend not running — show friendly message in dev
        if (err.message.includes('Failed to fetch') || err.message.startsWith('HTTP')) {
          saveStatus.textContent = '⚠ Backend not connected — changes not saved yet';
          saveStatus.className   = 'text-sm text-amber-600';
        } else {
          saveStatus.textContent = '✗ Failed to save. Please try again.';
          saveStatus.className   = 'text-sm text-red-500';
        }
        saveStatus.classList.remove('hidden');
      } finally {
        saveBtn.disabled = false;
        saveSpinner.classList.add('hidden');
      }
    });

    /* ── Logout ─────────────────────────────────────────────── */
    document.getElementById('profileSignOutBtn').addEventListener('click', logout);

    }); // end getCurrentUser().then()
  </script>
</body>
</html>
