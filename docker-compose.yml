version: '3.9'

services:

  # ── Frontend (Nginx static file server + reverse proxy) ───────────
  frontend:
    image: nginx:alpine
    container_name: foodpac-frontend
    restart: unless-stopped
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "3000:80"          # ← frontend accessible at http://localhost:3000
    depends_on:
      - backend
    networks:
      - foodpac-net

  # ── Backend (Spring Boot) ──────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: foodpac-backend
    restart: unless-stopped
    environment:
      DB_URL:             jdbc:postgresql://db:5432/foodpac
      DB_USER:            ${DB_USER}
      DB_PASS:            ${DB_PASSWORD}
      GOOGLE_CLIENT_ID:   ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      JWT_SECRET:         ${JWT_SECRET}
      FRONTEND_URL:       ${FRONTEND_URL:-http://localhost:3000}
      COOKIE_SECURE:      ${COOKIE_SECURE:-false}
      OPENAI_API_KEY:     ${OPENAI_API_KEY}
      PACKIFY_API_KEY:    ${PACKIFY_API_KEY}
      RESEND_API_KEY:     ${RESEND_API_KEY}
    expose:
      - "8080"             # only reachable from within Docker network (via Nginx)
    depends_on:
      db:
        condition: service_healthy
    networks:
      - foodpac-net

  # ── Database (PostgreSQL) ──────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: foodpac-db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       foodpac
      POSTGRES_USER:     ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d foodpac"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - foodpac-net

volumes:
  postgres_data:

networks:
  foodpac-net:
    driver: bridge
