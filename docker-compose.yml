version: '3.9'

services:

  # ── Frontend (Nginx static file server + reverse proxy) ───────────
  frontend:
    image: nginx:alpine
    container_name: foodpac-frontend
    restart: unless-stopped
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"            # ← frontend accessible at http://localhost (prod) or http://localhost:3000 (dev)
    depends_on:
      - backend
    networks:
      - foodpac-net
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
        reservations:
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Backend (Spring Boot) ──────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: foodpac-backend
    restart: unless-stopped
    environment:
      DB_URL:             jdbc:postgresql://db:5432/foodpac
      DB_USER:            ${DB_USER}
      DB_PASS:            ${DB_PASSWORD}
      GOOGLE_CLIENT_ID:   ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      JWT_SECRET:         ${JWT_SECRET}
      FRONTEND_URL:       ${FRONTEND_URL:-http://localhost:3000}
      COOKIE_SECURE:      ${COOKIE_SECURE:-false}
      OPENAI_API_KEY:     ${OPENAI_API_KEY}
      PACKIFY_API_KEY:    ${PACKIFY_API_KEY}
      RESEND_API_KEY:     ${RESEND_API_KEY}
      JAVA_OPTS:          "-Xms256m -Xmx512m -XX:+UseContainerSupport"
    expose:
      - "8080"             # only reachable from within Docker network (via Nginx)
    depends_on:
      db:
        condition: service_healthy
    networks:
      - foodpac-net
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 700M
        reservations:
          memory: 400M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Database (PostgreSQL) ──────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: foodpac-db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       foodpac
      POSTGRES_USER:     ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "127.0.0.1:5432:5432"  # only localhost, for SSH tunnel access
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d foodpac"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - foodpac-net
    deploy:
      resources:
        limits:
          cpus: '0.75'
          memory: 512M
        reservations:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:

networks:
  foodpac-net:
    driver: bridge
